<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>solixo.dev</title>
<style>
  :root {
    --bg0: #050814;
    --bg1: #0b1224;
    --bg2: #101b36;
    --panel: rgba(12, 18, 36, 0.78);
    --line: rgba(255, 255, 255, 0.08);
    --text: #eef4ff;
    --muted: #9eaed6;
    --accent: #81e9ff;
    --accent2: #a384ff;
    --orange: #ffb36c;
    --shadow: 0 18px 50px rgba(0, 0, 0, 0.3);
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    background:
      radial-gradient(circle at top, rgba(129, 233, 255, 0.08), transparent 28%),
      radial-gradient(circle at 80% 20%, rgba(163, 132, 255, 0.08), transparent 22%),
      linear-gradient(180deg, var(--bg2), var(--bg0));
    color: var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body {
    overflow-x: hidden;
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    width: min(1280px, calc(100% - 40px));
    margin: 0 auto;
    padding: 42px 0 34px;
  }

  .hero {
    margin-bottom: 26px;
  }

  .brandWrap {
    position: relative;
    display: inline-block;
    line-height: 0.88;
    letter-spacing: -0.08em;
  }

  .brandMain {
    margin: 0;
    font-size: clamp(72px, 16vw, 220px);
    font-weight: 900;
    color: var(--text);
  }

  .brandSub {
    position: absolute;
    right: 0;
    bottom: 6%;
    font-size: clamp(24px, 4vw, 58px);
    font-weight: 900;
    letter-spacing: -0.05em;
    color: var(--orange);
  }

  .heroText {
    margin: 16px 0 0;
    max-width: 46ch;
    color: var(--muted);
    font-size: 17px;
    line-height: 1.6;
  }

  .sectionHeader {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 16px;
    margin: 0 0 14px;
  }

  .sectionTitle {
    margin: 0;
    font-size: clamp(24px, 4vw, 34px);
    font-weight: 900;
    letter-spacing: -0.05em;
  }

  .sectionNote {
    color: var(--muted);
    font-size: 14px;
  }

  .gamesGrid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 18px;
  }

  .gameCard {
    position: relative;
    min-height: 340px;
    padding: 20px;
    border-radius: 30px;
    border: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(16, 24, 48, 0.9), rgba(9, 14, 30, 0.88));
    box-shadow: var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .gameCard::before {
    content: "";
    position: absolute;
    right: -80px;
    bottom: -90px;
    width: 260px;
    height: 260px;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(163, 132, 255, 0.18), transparent 68%);
    pointer-events: none;
  }

  .gameCard.playable {
    cursor: pointer;
    transition: transform 0.14s ease, border-color 0.14s ease;
  }

  .gameCard.playable:hover {
    transform: translateY(-3px);
    border-color: rgba(129, 233, 255, 0.3);
  }

  .thumb {
    height: 180px;
    border-radius: 22px;
    border: 1px solid var(--line);
    background:
      radial-gradient(circle at 30% 30%, rgba(129, 233, 255, 0.16), transparent 24%),
      radial-gradient(circle at 70% 45%, rgba(163, 132, 255, 0.18), transparent 22%),
      linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    position: relative;
    overflow: hidden;
  }

  .thumb.skyDash::before,
  .thumb.skyDash::after {
    content: "";
    position: absolute;
  }

  .thumb.skyDash::before {
    left: 26%;
    bottom: 18%;
    width: 68px;
    height: 92px;
    background: linear-gradient(180deg, #ffffff, #d7f5ff);
    clip-path: polygon(50% 0%, 100% 100%, 50% 74%, 0% 100%);
    transform: rotate(-10deg);
    filter: drop-shadow(0 12px 24px rgba(0, 0, 0, 0.24));
  }

  .thumb.skyDash::after {
    right: 16%;
    top: 20%;
    width: 86px;
    height: 86px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #ffd76b, #ff875e 75%);
    box-shadow: 0 0 22px rgba(255, 211, 107, 0.24);
  }

  .thumb.empty::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.03), transparent),
      repeating-linear-gradient(135deg, rgba(255,255,255,0.02) 0 14px, transparent 14px 28px);
  }

  .tag {
    display: inline-flex;
    align-items: center;
    width: fit-content;
    padding: 8px 10px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.05);
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  .gameName {
    margin: 16px 0 8px;
    font-size: clamp(32px, 5vw, 46px);
    font-weight: 900;
    letter-spacing: -0.05em;
    line-height: 0.96;
  }

  .gameName span {
    color: var(--accent);
  }

  .gameText {
    margin: 0;
    color: var(--muted);
    line-height: 1.55;
    max-width: 34ch;
  }

  .cardBottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .metaRow {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .metaTag {
    padding: 8px 10px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.05);
    color: var(--text);
    font-size: 12px;
    font-weight: 700;
  }

  .openButton {
    border: 0;
    border-radius: 14px;
    padding: 12px 16px;
    font: inherit;
    font-weight: 800;
    color: #061019;
    background: linear-gradient(135deg, var(--accent), #dffcff);
    cursor: pointer;
    transition: transform 0.12s ease;
  }

  .openButton:hover {
    transform: translateY(-1px);
  }

  .openButton:active {
    transform: translateY(1px) scale(0.99);
  }

  .soonButton {
    border-radius: 14px;
    padding: 12px 16px;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.05);
    color: var(--muted);
    font-weight: 800;
  }

  @media (max-width: 900px) {
    .gamesGrid {
      grid-template-columns: 1fr;
    }

    .gameCard {
      min-height: 300px;
    }
  }
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<main class="page">
  <section class="hero">
    <div class="brandWrap">
      <h1 class="brandMain">solixo</h1>
      <div class="brandSub">.dev</div>
    </div>
    <p class="heroText">A home for small browser games and experiments.</p>
  </section>

  <section>
    <div class="sectionHeader">
      <h2 class="sectionTitle">Games</h2>
      <div class="sectionNote">More can be added later.</div>
    </div>

    <div class="gamesGrid">
      <a class="gameCard playable" href="./sky-dash/">
        <div>
          <div class="tag">Live</div>
          <div class="thumb skyDash"></div>
          <h3 class="gameName">Sky Dash <span>V3</span></h3>
          <p class="gameText">Fast runs, evolving builds, class paths, and boss clears.</p>
        </div>

        <div class="cardBottom">
          <div class="metaRow">
            <span class="metaTag">Arcade</span>
            <span class="metaTag">Survival</span>
          </div>
          <button class="openButton" type="button">Open</button>
        </div>
      </a>

      <div class="gameCard">
        <div>
          <div class="tag">Coming Soon</div>
          <div class="thumb empty"></div>
          <h3 class="gameName">Coming Soon</h3>
          <p class="gameText">Reserved for the next game in the hub.</p>
        </div>

        <div class="cardBottom">
          <div class="metaRow">
            <span class="metaTag">Next Slot</span>
          </div>
          <div class="soonButton">Soon</div>
        </div>
      </div>
    </div>
  </section>
</main>

<script>
const Canvas = document.getElementById('bgCanvas')
const Ctx = Canvas.getContext('2d')
const DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1))
let Width = 0
let Height = 0
let LastTime = 0
const Stars = []

function resize() {
  Width = window.innerWidth
  Height = window.innerHeight
  Canvas.width = Math.floor(Width * DPR)
  Canvas.height = Math.floor(Height * DPR)
  Canvas.style.width = Width + 'px'
  Canvas.style.height = Height + 'px'
  Ctx.setTransform(DPR, 0, 0, DPR, 0, 0)
  buildStars()
}

function rand(min, max) {
  return Math.random() * (max - min) + min
}

function buildStars() {
  Stars.length = 0
  const count = Math.floor((Width * Height) / 9000)

  for (let i = 0; i < count; i++) {
    Stars.push({
      x: Math.random() * Width,
      y: Math.random() * Height,
      size: rand(0.8, 2.4),
      speed: rand(8, 36),
      alpha: rand(0.12, 0.7),
    })
  }
}

function drawBackground(dt) {
  const gradient = Ctx.createLinearGradient(0, 0, 0, Height)
  gradient.addColorStop(0, '#101b36')
  gradient.addColorStop(1, '#050814')
  Ctx.fillStyle = gradient
  Ctx.fillRect(0, 0, Width, Height)

  for (const star of Stars) {
    star.y += star.speed * dt

    if (star.y > Height + 8) {
      star.y = -8
      star.x = Math.random() * Width
    }

    Ctx.globalAlpha = star.alpha
    Ctx.fillStyle = '#dbe7ff'
    Ctx.beginPath()
    Ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2)
    Ctx.fill()
  }

  Ctx.globalAlpha = 1
  Ctx.strokeStyle = 'rgba(255, 255, 255, 0.035)'
  Ctx.lineWidth = 1

  for (let x = 0; x < Width; x += 54) {
    Ctx.beginPath()
    Ctx.moveTo(x, 0)
    Ctx.lineTo(x, Height)
    Ctx.stroke()
  }

  for (let y = 0; y < Height; y += 54) {
    Ctx.beginPath()
    Ctx.moveTo(0, y)
    Ctx.lineTo(Width, y)
    Ctx.stroke()
  }
}

function loop(timestamp) {
  if (!LastTime) {
    LastTime = timestamp
  }

  const dt = Math.min(0.033, (timestamp - LastTime) / 1000)
  LastTime = timestamp
  drawBackground(dt)
  requestAnimationFrame(loop)
}

window.addEventListener('resize', resize)
resize()
requestAnimationFrame(loop)
</script>
</body>
</html>
